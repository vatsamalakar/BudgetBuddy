{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <div class="card-body">

                <h2 class="mb-4">
                    Add Transaction
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Transaction Type
                        </label>

                        <select
                            class="form-select"
                            name="type"
                            required
                        >
                            <option value="Income">
                                Income
                            </option>

                            <option value="Expense">
                                Expense
                            </option>
                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Amount
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="amount"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Category
                        </label>

                        <select
                            class="form-select"
                            name="category"
                            required
                        >

                            <option>
                                Food
                            </option>

                            <option>
                                Transportation
                            </option>

                            <option>
                                Housing
                            </option>

                            <option>
                                Entertainment
                            </option>

                            <option>
                                Shopping
                            </option>

                            <option>
                                Healthcare
                            </option>

                            <option>
                                Income
                            </option>

                            <option>
                                Other
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Date
                        </label>

                        <input
                            type="date"
                            name="date"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            name="description"
                            rows="3"
                        ></textarea>

                    </div>

                    <button
                        class="btn btn-success"
                    >
                        Save Transaction
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
